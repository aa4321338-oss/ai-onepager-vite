<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>官方 LINE 加入頁</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: Arial, "Microsoft JhengHei", sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .wrap {
      position: relative;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      background: #000;
    }

    .main-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      display: block;
    }

    /* 可視藍框：這次有明顯往上拉 */
    .join-btn {
      position: absolute;
      left: 13%;
      bottom: 13.2%;
      width: 74%;
      height: 14.6%;
      border-radius: 40px;
      display: block;
      text-decoration: none;
      background: rgba(0, 170, 255, 0.20);
      border: 3px solid rgba(0, 170, 255, 0.95);
      box-shadow: 0 0 0 2px rgba(255,255,255,0.35) inset;
    }

    .join-btn:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <img
      class="main-img"
      src="93955d48-0faa-495f-aad7-2f1028c63ad5.png"
      alt="立即加入官方LINE"
    />

    <a
      class="join-btn"
      href="https://lin.ee/n4TsW6i"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="立即加入官方LINE"
    ></a>
  </div>
</body>
</html>
