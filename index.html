<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>官方 LINE 加入頁</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      background: #000;
      overflow-x: hidden;
      font-family: Arial, "Microsoft JhengHei", sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }

    .wrap {
      position: relative;
      width: 100%;
      max-width: 768px;
      margin: 0 auto;
      line-height: 0;
    }

    .main-img {
      width: 100%;
      height: auto;
      display: block;
    }

    .join-btn {
      position: absolute;
      left: 15%;
      bottom: 2.8%;
      width: 70%;
      height: 17%;
      border-radius: 40px;
      display: block;
      text-decoration: none;
    }

    .join-btn:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <img
      class="main-img"
      src="93955d48-0faa-495f-aad7-2f1028c63ad5.png"
      alt="立即加入官方LINE"
    />

    <a
      class="join-btn"
      href="https://lin.ee/n4TsW6i"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="立即加入官方LINE"
    ></a>
  </div>
</body>
</html>
